<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Nike Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <div class="left">
        <img src="nike.svg" class="logo">

        <h2>Zrychli tempo,<br> soustřeď se na rychlost!</h2>

        <img src="bota.png" class="bota">

        <div class="price">
            <h1>2450 Kč</h1>
            <p>Prodloužená záruka 3 roky</p>
        </div>
    </div>

    <div class="right">
        <h1>NIKE AIR ZOOM PEGASUS 33</h1>
        <p class="subtitle">Dámská běžecká bota</p>

        <p class="desc">
            Nike Air Zoom Pegasus 33 dokonale padne, dodá pocit rychlosti a má pružné tlumení,
            které ti umožní zrychlit tempo a soustředit se na rychlost.
        </p>

        <div class="sizes">
            <p>VELIKOST</p>
            <div class="size-list">
                <span>35</span>
                <span>36</span>
                <span>37</span>
                <span class="active">38</span>
                <span>39</span>
                <span>40</span>
            </div>
        </div>

        <button>DO KOŠÍKU</button>
    </div>
</div>

</body>
</html>
